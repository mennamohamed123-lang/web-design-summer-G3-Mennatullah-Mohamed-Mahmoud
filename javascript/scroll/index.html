<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scroll & Timer Example</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      height: 1500px;
      padding: 30px;
    }

    #scroll-div {
      height: 200px;
      overflow-y: scroll;
      margin-top: 20px;
    }

    .content {
      height: 800px;
    }
  </style>
</head>

<body>

  <h1 class="text-primary">0</h1>

  <div id="scroll-div" class="alert alert-success">
    <h3>Scroll Down Here</h3>
    <p>Scroll inside this box to change its color.</p>

    <div class="content"></div>
  </div>

  <script src="script.js"></script>

</body>
</html>
